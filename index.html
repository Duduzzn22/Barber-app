<!DOCTYPE html>

<html lang="pt-BR" x-data="app()" x-init="init()">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BarberOS">
<meta name="theme-color" content="#080808">
<title>BarberOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{--gold:#D4A843;--gold-l:#F0C96A;--gold-d:#8A6B28;--gold-bg:rgba(212,168,67,.08);--bg:#080808;--s1:#101010;--s2:#181818;--s3:#202020;--s4:#282828;--b1:#222222;--b2:#2C2C2C;--tx:#F5F0E8;--tx2:#B8B0A0;--mt:#525050;--red:#EF4444;--grn:#22C55E}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
.fd{font-family:'Playfair Display',serif}
.gold{color:var(--gold)}.muted{color:var(--mt)}.tx2{color:var(--tx2)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px}
.card2{background:var(--s2);border:1px solid var(--b1);border-radius:12px}
.card3{background:var(--s3);border:1px solid var(--b2);border-radius:10px}
.page{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:12px}
.page.active{display:block}
.app{display:flex;flex-direction:column;height:100dvh}
.hdr{flex-shrink:0;background:rgba(8,8,8,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--b1);padding:0 18px 13px;padding-top:max(14px,env(safe-area-inset-top))}
.cnt{flex:1;overflow:hidden;position:relative}
.tbar{flex-shrink:0;background:rgba(8,8,8,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--b1);display:flex;justify-content:space-around;align-items:center;padding-top:9px;padding-bottom:max(14px,env(safe-area-inset-bottom))}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 18px;cursor:pointer;color:var(--mt);font-size:10px;font-weight:700;border:none;background:none;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;position:relative}
.nb.active{color:var(--gold)}
.nb .dot{position:absolute;top:1px;right:12px;width:6px;height:6px;border-radius:50%;background:var(--gold);display:none}
.nb .dot.on{display:block}
.ni{width:22px;height:22px;stroke-width:1.8}
.btn{background:linear-gradient(135deg,#C09020,var(--gold));color:#000;font-weight:700;border-radius:13px;padding:15px;width:100%;font-size:15px;border:none;cursor:pointer;transition:transform .15s;font-family:'DM Sans',sans-serif;letter-spacing:.01em}
.btn:active{transform:scale(.97)}
.bsm{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(212,168,67,.22);font-weight:600;border-radius:10px;padding:9px 15px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;border-style:solid}
.bsm:active{background:var(--gold);color:#000}
.bdel{background:rgba(239,68,68,.1);color:var(--red);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bedit{background:var(--gold-bg);color:var(--gold);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.inp{background:var(--s2);border:1px solid var(--b2);color:var(--tx);border-radius:12px;padding:13px 15px;font-size:15px;width:100%;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--mt)}
select.inp option{background:#181818}
.lbl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end}
.sht{background:var(--s1);border-radius:22px 22px 0 0;padding:20px 18px;padding-bottom:max(26px,env(safe-area-inset-bottom));width:100%;max-height:93dvh;overflow-y:auto}
.drg{width:34px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px}
.ptr{height:6px;background:var(--s3);border-radius:4px;overflow:hidden}
.ptf{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold-l));border-radius:4px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.alb{border-left:3px solid var(--gold)}
.bdg{background:var(--gold);color:#000;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:800}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:13px;cursor:pointer;font-weight:500;position:relative;transition:background .15s}
.cd.td{background:var(--gold);color:#000;font-weight:800}
.cd.sel:not(.td){border:2px solid var(--gold);color:var(--gold)}
.cd.ha::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold)}
.cd.td.ha::after{background:#000}
.sp{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
.sp-p{background:rgba(251,191,36,.12);color:#FBBF24}
.sp-c{background:rgba(34,197,94,.12);color:var(--grn)}
.sp-d{background:rgba(99,102,241,.15);color:#818CF8}
.sp-x{background:rgba(239,68,68,.12);color:var(--red)}
.bc{display:flex;align-items:flex-end;gap:5px;height:76px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bbar{width:100%;background:linear-gradient(180deg,var(--gold-l),var(--gold-d));border-radius:5px 5px 0 0;transition:height .6s cubic-bezier(.16,1,.3,1);min-height:3px}
.blbl{font-size:10px;color:var(--mt);font-weight:600}
.sw{position:relative}
.sw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mt);pointer-events:none}
.sw .inp{padding-left:40px}
.tw{position:fixed;top:max(18px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:7px;width:calc(100% - 28px);max-width:380px}
.ts{background:var(--s1);border:1px solid var(--b2);border-radius:13px;padding:12px 15px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 10px 40px rgba(0,0,0,.7);animation:tIn .28s ease forwards}
.ts.ok{border-left:3px solid var(--grn)}
.ts.err{border-left:3px solid var(--red)}
.ts.inf{border-left:3px solid var(--gold)}
@keyframes tIn{from{opacity:0;transform:translateY(-10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}
.ts.out{animation:tOut .22s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .32s cubic-bezier(.16,1,.3,1) both}
@keyframes si{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.si{animation:si .22s ease both}
.spl{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spl-ico{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#140F08,#221608);border:1px solid var(--gold-d);display:flex;align-items:center;justify-content:center}
@keyframes sOut{from{opacity:1}to{opacity:0;pointer-events:none}}
.spl.hide{animation:sOut .45s ease forwards}
.tabs{display:flex;background:var(--s2);border-radius:11px;padding:3px;gap:2px}
.tab{flex:1;padding:8px;font-size:13px;font-weight:600;text-align:center;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--mt);border:none;background:transparent;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--s4);color:var(--tx)}
.av{width:40px;height:40px;border-radius:11px;background:var(--gold-bg);border:1px solid rgba(212,168,67,.18);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--gold);flex-shrink:0}
.sec{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.1em}
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:10px;text-align:center;background:var(--s1);border:1px solid var(--b1);border-radius:16px}
::-webkit-scrollbar{display:none}
[x-cloak]{display:none!important}
</style>
</head>
<body>

<!-- SPLASH -->

<div class="spl" id="spl">
  <div class="spl-ico">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <path d="M9 7.5 Q18 3 27 7.5 L31 27 Q23 33 18 32 Q13 33 5 27 Z" fill="none" stroke="#D4A843" stroke-width="1.4"/>
      <path d="M14 13 L22 13 M18 9 L18 27" stroke="#D4A843" stroke-width="2" stroke-linecap="round"/>
      <circle cx="18" cy="18" r="3.5" fill="none" stroke="#F0C96A" stroke-width="1.2"/>
    </svg>
  </div>
  <div style="text-align:center">
    <p class="fd gold" style="font-size:28px;letter-spacing:.02em">BarberOS</p>
    <p class="muted" style="font-size:11px;margin-top:3px;letter-spacing:.08em;text-transform:uppercase">Gestão Profissional</p>
  </div>
  <div style="margin-top:12px;width:44px;height:2px;background:var(--b2);border-radius:1px;overflow:hidden">
    <div id="sbar" style="height:100%;background:var(--gold);width:0;transition:width 1.1s ease;border-radius:1px"></div>
  </div>
</div>

<!-- TOASTS -->

<div class="tw" id="tw"></div>

<div class="app" x-cloak>

  <!-- HEADER -->

  <div class="hdr">
    <div class="flex items-center justify-between">
      <div>
        <p class="muted" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em" x-text="hdrSub()"></p>
        <h1 class="fd gold" style="font-size:21px;line-height:1.15" x-text="hdrTitle()"></h1>
      </div>
      <div class="flex items-center gap-2">
        <div style="display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:5px 11px">
          <i data-lucide="calendar" style="width:12px;height:12px;color:var(--gold)"></i>
          <span class="tx2" style="font-size:11px;font-weight:600" x-text="hdStr()"></span>
        </div>
        <button @click="openAg()" style="width:37px;height:37px;border-radius:11px;background:linear-gradient(135deg,#C09020,var(--gold));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer">
          <i data-lucide="plus" style="width:19px;height:19px;color:#000;stroke-width:3"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- CONTENT -->

  <div class="cnt">


<!-- ══ HOME ══ -->
<div id="pg-home" class="page active">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px">
    <div class="card fu" style="padding:17px;animation-delay:.05s">
      <div class="flex items-center justify-between" style="margin-bottom:8px">
        <span class="muted" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Receita Hoje</span>
        <i data-lucide="trending-up" style="width:13px;height:13px;color:var(--gold)"></i>
      </div>
      <p class="fd gold" style="font-size:23px" x-text="fmt(rHoje())"></p>
      <p class="muted" style="font-size:11px;margin-top:2px" x-text="agHoje().length+' atend.'"></p>
    </div>
    <div class="card fu" style="padding:17px;animation-delay:.1s">
      <div class="flex items-center justify-between" style="margin-bottom:8px">
        <span class="muted" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Lucro Hoje</span>
        <i data-lucide="wallet" style="width:13px;height:13px;" :style="lHoje()>=0?'color:var(--grn)':'color:var(--red)'"></i>
      </div>
      <p class="fd" style="font-size:23px" :style="lHoje()>=0?'color:var(--grn)':'color:var(--red)'" x-text="fmt(lHoje())"></p>
      <p class="muted" style="font-size:11px;margin-top:2px" x-text="fmt(dHoje())+' despesas'"></p>
    </div>
  </div>

  <div class="card fu" style="padding:15px;margin-bottom:11px;animation-delay:.13s">
    <div class="flex items-center justify-between" style="margin-bottom:10px">
      <div class="flex items-center gap-2">
        <i data-lucide="target" style="width:13px;height:13px;color:var(--gold)"></i>
        <span style="font-size:13px;font-weight:600">Meta Mensal</span>
      </div>
      <span class="muted" style="font-size:11px" x-text="fmt(rMes())+' / '+fmt(meta)"></span>
    </div>
    <div class="ptr"><div class="ptf" :style="'width:'+Math.min(100,(rMes()/meta)*100)+'%'"></div></div>
    <div class="flex justify-between" style="margin-top:7px">
      <span class="muted" style="font-size:11px" x-text="Math.round((rMes()/meta)*100)+'% atingido'"></span>
      <span style="font-size:11px;font-weight:600;color:var(--gold)" x-text="fmt(Math.max(0,meta-rMes()))+' para meta'"></span>
    </div>
  </div>

  <div class="card fu" style="padding:15px;margin-bottom:11px;animation-delay:.16s">
    <div class="flex items-center justify-between" style="margin-bottom:13px">
      <div class="flex items-center gap-2">
        <i data-lucide="bar-chart-2" style="width:13px;height:13px;color:var(--gold)"></i>
        <span style="font-size:13px;font-weight:600">Receita — 7 dias</span>
      </div>
      <span class="muted" style="font-size:11px" x-text="fmt(rSemana())"></span>
    </div>
    <div class="bc">
      <template x-for="d in dSemana()" :key="d.lbl">
        <div class="bcol">
          <div class="bbar" :style="'height:'+d.pct+'%'" :title="fmt(d.v)"></div>
          <span class="blbl" x-text="d.lbl"></span>
        </div>
      </template>
    </div>
  </div>

  <div class="fu" style="animation-delay:.18s">
    <div class="flex items-center justify-between" style="margin-bottom:9px">
      <span class="sec">Agenda de Hoje</span>
      <span class="bdg" x-text="agHoje().length"></span>
    </div>
    <template x-if="agHoje().length===0">
      <div class="emp"><i data-lucide="calendar-x-2" style="width:26px;height:26px;color:var(--mt)"></i><p class="muted" style="font-size:13px">Nenhum atendimento hoje</p></div>
    </template>
    <div style="display:flex;flex-direction:column;gap:7px">
      <template x-for="a in agHoje()" :key="a.id">
        <div class="card2 alb" style="padding:11px 11px 11px 13px">
          <div class="flex items-center justify-between">
            <div class="flex items-center" style="gap:9px">
              <div class="av" x-text="a.cliente.charAt(0).toUpperCase()"></div>
              <div>
                <p style="font-size:14px;font-weight:600" x-text="a.cliente"></p>
                <p class="muted" style="font-size:12px;margin-top:1px" x-text="a.servico+' · '+a.hora"></p>
              </div>
            </div>
            <div style="text-align:right">
              <p style="font-size:14px;font-weight:700;color:var(--gold)" x-text="fmt(a.preco)"></p>
              <button class="sp" :class="'sp-'+a.status[0]" @click="cycleStatus(a)" x-text="stLabel(a.status)" style="margin-top:4px"></button>
            </div>
          </div>
          <template x-if="a.obs">
            <p class="muted" style="font-size:11px;margin-top:7px;padding:7px 9px;background:var(--s3);border-radius:7px" x-text="'📝 '+a.obs"></p>
          </template>
        </div>
      </template>
    </div>
  </div>

  <div class="fu" style="animation-delay:.21s;margin-top:14px;padding-bottom:8px">
    <div class="flex items-center justify-between" style="margin-bottom:9px">
      <span class="sec">Próximos 7 Dias</span>
      <span class="bdg" x-text="proxAgs().length"></span>
    </div>
    <template x-if="proxAgs().length===0">
      <div class="card" style="padding:14px;text-align:center"><p class="muted" style="font-size:13px">Sem agendamentos futuros</p></div>
    </template>
    <div style="display:flex;flex-direction:column;gap:7px">
      <template x-for="a in proxAgs()" :key="a.id">
        <div class="card2" style="padding:11px">
          <div class="flex items-center justify-between">
            <div>
              <p style="font-size:14px;font-weight:600" x-text="a.cliente"></p>
              <p class="muted" style="font-size:11px;margin-top:1px" x-text="fmtD(a.data)+' · '+a.hora+' · '+a.servico"></p>
            </div>
            <p style="font-size:13px;font-weight:700;color:var(--gold)" x-text="fmt(a.preco)"></p>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- ══ CALENDAR ══ -->
<div id="pg-calendar" class="page">

  <div class="card" style="padding:15px;margin-bottom:12px">
    <div class="flex items-center justify-between" style="margin-bottom:13px">
      <button @click="prevM()" style="width:31px;height:31px;border-radius:8px;background:var(--s3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <i data-lucide="chevron-left" style="width:15px;height:15px;color:var(--tx2)"></i>
      </button>
      <span style="font-size:14px;font-weight:700;text-transform:capitalize" x-text="nomeMes()"></span>
      <button @click="nextM()" style="width:31px;height:31px;border-radius:8px;background:var(--s3);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer">
        <i data-lucide="chevron-right" style="width:15px;height:15px;color:var(--tx2)"></i>
      </button>
    </div>
    <div class="cg" style="margin-bottom:5px">
      <template x-for="d in ['D','S','T','Q','Q','S','S']">
        <div class="muted" style="text-align:center;font-size:10px;font-weight:700;padding:3px 0" x-text="d"></div>
      </template>
    </div>
    <div class="cg">
      <template x-for="d in calDias()" :key="d.k">
        <div class="cd" :class="{td:d.isT,sel:d.date===selDate&&!d.isT,ha:haAg(d.date),muted:!d.date}" @click="d.date&&(selDate=d.date)" x-text="d.l"></div>
      </template>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px">
    <div class="card3" style="padding:9px;text-align:center">
      <p class="muted" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Atend.</p>
      <p class="fd gold" style="font-size:21px" x-text="agDia(selDate).length"></p>
    </div>
    <div class="card3" style="padding:9px;text-align:center">
      <p class="muted" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Receita</p>
      <p style="font-size:13px;font-weight:800;color:var(--gold);margin-top:3px" x-text="fmt(rDia(selDate))"></p>
    </div>
    <div class="card3" style="padding:9px;text-align:center">
      <p class="muted" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Lucro</p>
      <p style="font-size:13px;font-weight:800;margin-top:3px" :style="lDia(selDate)>=0?'color:var(--grn)':'color:var(--red)'" x-text="fmt(lDia(selDate))"></p>
    </div>
  </div>

  <div class="flex items-center justify-between" style="margin-bottom:9px">
    <span class="sec" x-text="'Agend. — '+fmtD(selDate)"></span>
    <button class="bsm" @click="openAg();novoAg.data=selDate">+ Novo</button>
  </div>
  <template x-if="agDia(selDate).length===0">
    <div class="emp"><i data-lucide="scissors" style="width:26px;height:26px;color:var(--mt)"></i><p class="muted" style="font-size:13px">Nenhum agendamento neste dia</p></div>
  </template>
  <div style="display:flex;flex-direction:column;gap:7px;padding-bottom:10px">
    <template x-for="a in agDia(selDate)" :key="a.id">
      <div class="card2 alb" style="padding:11px 11px 11px 13px">
        <div class="flex items-center justify-between">
          <div class="flex items-center" style="gap:9px">
            <div class="av" x-text="a.cliente.charAt(0).toUpperCase()"></div>
            <div>
              <p style="font-size:14px;font-weight:600" x-text="a.cliente"></p>
              <p class="muted" style="font-size:12px;margin-top:1px" x-text="a.servico+' · '+a.hora"></p>
              <button class="sp" :class="'sp-'+a.status[0]" @click="cycleStatus(a)" x-text="stLabel(a.status)" style="margin-top:5px"></button>

<script>
(function(){const v=window.innerHeight*.01;document.documentElement.style.setProperty('--vh',v+'px');window.addEventListener('resize',()=>document.documentElement.style.setProperty('--vh',window.innerHeight*.01+'px'));})();

window.addEventListener('load',()=>{
  const b=document.getElementById('sbar'),s=document.getElementById('spl');
  setTimeout(()=>b.style.width='100%',40);
  setTimeout(()=>{s.classList.add('hide');setTimeout(()=>s.remove(),460);},1350);
});

function toast(msg,t='inf',dur=2700){
  const w=document.getElementById('tw'),e=document.createElement('div');
  const ic={ok:'check-circle',err:'x-circle',inf:'info'};
  const cl={ok:'var(--grn)',err:'var(--red)',inf:'var(--gold)'};
  e.className='ts '+t;
  e.innerHTML='<i data-lucide="'+(ic[t]||'info')+'" style="width:15px;height:15px;flex-shrink:0;color:'+cl[t]+'"></i><span>'+msg+'</span>';
  w.appendChild(e);lucide.createIcons({nodes:[e]});
  setTimeout(()=>{e.classList.add('out');setTimeout(()=>e.remove(),240);},dur);
}

function app(){return{
  pg:'home',showAg:false,showServ:false,editServo:null,
  selDate:'',calMes:new Date().getMonth(),calAno:new Date().getFullYear(),
  meta:5000,ftab:'m',busca:'',
  agendamentos:[],despesas:[],servicos:[],
  novoAg:{cliente:'',servico:'',preco:'',hora:'',data:'',status:'confirmado',obs:''},
  novaDep:{desc:'',val:'',data:'',cat:'produto'},
  novoServ:{nome:'',preco:'',dur:''},

  init(){
    this.selDate=this.today();
    this.novoAg.data=this.selDate;
    this.novoAg.hora=new Date().getHours().toString().padStart(2,'0')+':00';
    this.novaDep.data=this.selDate;
    this.load();
    this.$nextTick(()=>lucide.createIcons());
    ['pg','showAg','showServ','agendamentos','despesas','servicos','ftab'].forEach(k=>this.$watch(k,()=>this.$nextTick(()=>lucide.createIcons())));
  },

  load(){
    this.agendamentos=JSON.parse(localStorage.getItem('ag')||'[]');
    this.despesas=JSON.parse(localStorage.getItem('dp')||'[]');
    this.servicos=JSON.parse(localStorage.getItem('sv')||'[]');
    this.meta=parseFloat(localStorage.getItem('mt')||'5000');
    if(!this.servicos.length){
      this.servicos=[{id:1,nome:'Corte',preco:45,dur:30},{id:2,nome:'Barba',preco:35,dur:20},{id:3,nome:'Corte + Barba',preco:70,dur:50},{id:4,nome:'Pigmentação',preco:90,dur:60},{id:5,nome:'Progressiva',preco:120,dur:90}];
      this.sv();
    }
  },
  ag(){localStorage.setItem('ag',JSON.stringify(this.agendamentos))},
  dp(){localStorage.setItem('dp',JSON.stringify(this.despesas))},
  sv(){localStorage.setItem('sv',JSON.stringify(this.servicos))},

  navTo(p){
    this.pg=p;
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
    const el=document.getElementById('pg-'+p);
    if(el){el.classList.add('active');el.scrollTop=0;}
    this.$nextTick(()=>lucide.createIcons());
  },

  hdrTitle(){return{home:'BarberOS',calendar:'Agenda',finance:'Finanças',settings:'Gerenciar'}[this.pg]||'BarberOS'},
  hdrSub(){return{home:'Painel Principal',calendar:'Atendimentos',finance:'Controle Financeiro',settings:'Config. & Serviços'}[this.pg]||''},
  hdStr(){return new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})},
  today(){return new Date().toISOString().split('T')[0]},
  fmt(v){return'R$ '+parseFloat(v||0).toFixed(2).replace('.',',')},
  fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return day+'/'+m+'/'+y},

  stLabel(s){return{pendente:'Pendente',confirmado:'Confirmado',concluido:'Concluído',cancelado:'Cancelado'}[s]||s},
  cycleStatus(a){
    const c=['pendente','confirmado','concluido','cancelado'];
    a.status=c[(c.indexOf(a.status)+1)%c.length];
    this.ag();toast('Status: '+this.stLabel(a.status),'inf',1600);
  },

  agHoje(){return this.agendamentos.filter(a=>a.data===this.today()).sort((a,b)=>a.hora.localeCompare(b.hora))},
  agDia(d){return this.agendamentos.filter(a=>a.data===d).sort((a,b)=>a.hora.localeCompare(b.hora))},
  haAg(d){return d&&this.agendamentos.some(a=>a.data===d)},
  proxAgs(){
    const t=new Date();t.setHours(0,0,0,0);
    const l=new Date(t);l.setDate(l.getDate()+7);
    return this.agendamentos.filter(a=>{const d=new Date(a.data+'T00:00:00');return d>t&&d<=l;}).sort((a,b)=>(a.data+a.hora).localeCompare(b.data+b.hora)).slice(0,10);
  },

  openAg(){this.novoAg={cliente:'',servico:'',preco:'',hora:new Date().getHours().toString().padStart(2,'0')+':00',data:this.selDate||this.today(),status:'confirmado',obs:''};this.showAg=true;},
  addAg(){
    if(!this.novoAg.cliente.trim()||!this.novoAg.data){toast('Preencha cliente e data.','err');return;}
    const s=this.novoAg.servico==='__c'?'Personalizado':this.novoAg.servico||'Serviço';
    this.agendamentos.push({id:Date.now(),...this.novoAg,servico:s,preco:parseFloat(this.novoAg.preco||0)});
    this.ag();this.showAg=false;toast('Agendamento adicionado!','ok');
  },
  delAg(id){if(!confirm('Remover agendamento?'))return;this.agendamentos=this.agendamentos.filter(a=>a.id!==id);this.ag();toast('Removido','inf');},
  autoP(){const s=this.servicos.find(sv=>sv.nome===this.novoAg.servico);if(s)this.novoAg.preco=s.preco;},
  clUnicos(){return[...new Set(this.agendamentos.map(a=>a.cliente))].sort()},

  rHoje(){return this.agHoje().reduce((s,a)=>s+parseFloat(a.preco||0),0)},
  rDia(d){return this.agDia(d).reduce((s,a)=>s+parseFloat(a.preco||0),0)},
  rMes(){const n=new Date();return this.agendamentos.filter(a=>{const d=new Date(a.data+'T00:00:00');return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).reduce((s,a)=>s+parseFloat(a.preco||0),0)},
  dHoje(){return this.despesas.filter(d=>d.data===this.today()).reduce((s,d)=>s+parseFloat(d.val||0),0)},
  dDia(d){return this.despesas.filter(dp=>dp.data===d).reduce((s,dp)=>s+parseFloat(dp.val||0),0)},
  dMes(){const n=new Date();return this.despesas.filter(d=>{const dt=new Date(d.data+'T00:00:00');return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();}).reduce((s,d)=>s+parseFloat(d.val||0),0)},
  lHoje(){return this.rHoje()-this.dHoje()},
  lDia(d){return this.rDia(d)-this.dDia(d)},
  lMes(){return this.rMes()-this.dMes()},
  rSemana(){const t=new Date();t.setHours(0,0,0,0);const i=new Date(t);i.setDate(i.getDate()-6);return this.agendamentos.filter(a=>{const d=new Date(a.data+'T00:00:00');return d>=i&&d<=t;}).reduce((s,a)=>s+parseFloat(a.preco||0),0)},
  dSemana(){
    const L=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],r=[];
    for(let i=6;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const v=this.agendamentos.filter(a=>a.data===ds).reduce((s,a)=>s+parseFloat(a.preco||0),0);r.push({lbl:L[d.getDay()],v,date:ds});}
    const mx=Math.max(...r.map(d=>d.v),1);
    return r.map(d=>({...d,pct:Math.max(4,Math.round((d.v/mx)*100))}));
  },

  depLista(){
    if(this.ftab==='h') return this.despesas.filter(d=>d.data===this.today()).sort((a,b)=>b.data.localeCompare(a.data));
    const n=new Date();return this.despesas.filter(d=>{const dt=new Date(d.data+'T00:00:00');return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();}).sort((a,b)=>b.data.localeCompare(a.data));
  },
  addDep(){
    if(!this.novaDep.desc.trim()||!this.novaDep.val){toast('Preencha descrição e valor.','err');return;}
    this.despesas.push({id:Date.now(),...this.novaDep,val:parseFloat(this.novaDep.val)});
    this.dp();this.novaDep={desc:'',val:'',data:this.today(),cat:'produto'};toast('Despesa registrada!','ok');
  },
  delDep(id){if(!confirm('Remover despesa?'))return;this.despesas=this.despesas.filter(d=>d.id!==id);this.dp();toast('Removida','inf')},
  catIco(c){return{produto:'🧴',aluguel:'🏠',equipamento:'✂️',marketing:'📣',outro:'📦'}[c]||'📦'},
  catLbl(c){return{produto:'Produto',aluguel:'Aluguel',equipamento:'Equipamento',marketing:'Marketing',outro:'Outro'}[c]||'Outro'},

  histMeses(){
    const m={};
    this.agendamentos.forEach(a=>{const d=new Date(a.data+'T00:00:00');const k=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');if(!m[k])m[k]={k,nome:d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),rec:0,dep:0,qtd:0};m[k].rec+=parseFloat(a.preco||0);m[k].qtd++;});
    this.despesas.forEach(d=>{const dt=new Date(d.data+'T00:00:00');const k=dt.getFullYear()+'-'+(dt.getMonth()+1).toString().padStart(2,'0');if(!m[k])m[k]={k,nome:dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}),rec:0,dep:0,qtd:0};m[k].dep+=parseFloat(d.val||0);});
    return Object.values(m).map(x=>({...x,luc:x.rec-x.dep})).sort((a,b)=>b.k.localeCompare(a.k));
  },

  openServ(){this.editServo=null;this.novoServ={nome:'',preco:'',dur:''};this.showServ=true;},
  editServ(s){this.editServo=s;this.novoServ={nome:s.nome,preco:s.preco,dur:s.dur||''};this.showServ=true;},
  saveServ(){
    if(!this.novoServ.nome.trim()||!this.novoServ.preco){toast('Preencha nome e preço.','err');return;}
    if(this.editServo){const i=this.servicos.findIndex(s=>s.id===this.editServo.id);this.servicos[i]={id:this.editServo.id,nome:this.novoServ.nome,preco:parseFloat(this.novoServ.preco),dur:parseInt(this.novoServ.dur)||null};}
    else this.servicos.push({id:Date.now(),nome:this.novoServ.nome,preco:parseFloat(this.novoServ.preco),dur:parseInt(this.novoServ.dur)||null});
    this.sv();this.showServ=false;toast(this.editServo?'Serviço atualizado!':'Serviço criado!','ok');
  },
  delServ(id){if(!confirm('Remover serviço?'))return;this.servicos=this.servicos.filter(s=>s.id!==id);this.sv();toast('Serviço removido','inf');},

  saveMeta(){localStorage.setItem('mt',this.meta);toast('Meta salva!','ok');},

  buscaRes(){
    if(this.busca.length<2)return[];
    const q=this.busca.toLowerCase(),map={};
    this.agendamentos.filter(a=>a.cliente.toLowerCase().includes(q)).forEach(a=>{if(!map[a.cliente])map[a.cliente]={nome:a.cliente,qtd:0,tot:0,ult:a.data};map[a.cliente].qtd++;map[a.cliente].tot+=parseFloat(a.preco||0);if(a.data>map[a.cliente].ult)map[a.cliente].ult=a.data;});
    return Object.values(map).sort((a,b)=>b.tot-a.tot);
  },

  exportar(){
    const d={agendamentos:this.agendamentos,despesas:this.despesas,servicos:this.servicos,meta:this.meta,data:new Date().toISOString()};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='barberos-backup.json';a.click();URL.revokeObjectURL(u);
    toast('Dados exportados!','ok');
  },
  limpar(){localStorage.clear();location.reload();},

  nomeMes(){return new Date(this.calAno,this.calMes,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'})},
  prevM(){if(this.calMes===0){this.calMes=11;this.calAno--;}else this.calMes--;},
  nextM(){if(this.calMes===11){this.calMes=0;this.calAno++;}else this.calMes++;},
  calDias(){
    const f=new Date(this.calAno,this.calMes,1).getDay(),days=new Date(this.calAno,this.calMes+1,0).getDate(),t=this.today(),c=[];
    for(let i=0;i<f;i++)c.push({k:'e'+i,l:'',date:null});
    for(let d=1;d<=days;d++){const ds=this.calAno+'-'+String(this.calMes+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');c.push({k:ds,l:d,date:ds,isT:ds===t});}
    return c;
  },
}}
</script>
